name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs on the same branch when a new push arrives.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & unit tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest installed Xcode
        # The project uses iOS 26 SDK APIs (.glassEffect, GlassEffectContainer,
        # .buttonStyle(.glass)). The runner's default Xcode.app is typically
        # a few versions behind — pick the highest numbered Xcode that is
        # actually installed.
        run: |
          echo "Installed Xcode apps:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            LATEST_XCODE=/Applications/Xcode.app
          fi
          echo "Selecting $LATEST_XCODE"
          sudo xcode-select --switch "$LATEST_XCODE"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcodebuild -showsdks | grep -i iphonesimulator || true

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: >
          xcodebuild
          -resolvePackageDependencies
          -project Pulsoria.xcodeproj
          -scheme Pulsoria

      - name: Run unit tests
        run: >
          xcodebuild test
          -project Pulsoria.xcodeproj
          -scheme Pulsoria
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
          -skipPackagePluginValidation
          -skipMacroValidation
          CODE_SIGN_IDENTITY=
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=NO
